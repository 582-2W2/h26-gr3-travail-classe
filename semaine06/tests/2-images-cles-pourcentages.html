<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2 - Images-clés avec pourcentages</title>
  <style>
    :root {
      --fond: #0b1020;
      --texte: #e2e8f0;
      --etoile: #fde047;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #1d4ed8, #0b1020 60%);
      color: var(--texte);
      font-family: system-ui, sans-serif;

      .scene { text-align: center; }

      .etoile {
        font-size: 5rem;
        display: inline-block;
        /* À compléter : appliquer l'animation */
        animation-name: danse-etoile;
        animation-duration: 1s;
        animation-iteration-count: infinite;
        animation-direction: alternate;
        cursor: pointer;
        user-select: none;

        &:hover {
          animation-play-state: paused;
        }
      }
    }

    @keyframes danse-etoile {
      /* À compléter : définir les 5 images clés */
      0%, 100% {
        translate: 0 0;
        rotate: 0;
        scale: 1;
        color: #fde047;
      }
      25% {
        translate: 0 -24px;
        rotate: 10deg;
        scale: 2;
      }
      50% {
        translate: 0 0;
        rotate: 0deg;
        scale: 0.5;
        color: rgb(30, 167, 12);
      }
      75% {
        translate: 0 -14px;
        rotate: -10deg;
        scale: 1.05;
        color: orange;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <h1>2 - Pourcentages</h1>
    <p>Ajouter l'étape manquante pour compléter la chorégraphie.</p>
    <div class="etoile" aria-hidden="true">★</div>
  </div>
</body>
</html>
