<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 - Durée, délai et itérations (incomplet)</title>
  <style>
    :root {
      --fond: #f1f5f9;
      --texte: #0f172a;
      --couleur-1: #22c55e;
      --couleur-2: #0ea5e9;
      --couleur-3: #f97316;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--fond);
      color: var(--texte);
      padding: 2rem;

      .grille {
        max-width: 900px;
        margin: 0 auto;
        display: grid;
        gap: 1rem;
      }

      .ligne {
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        padding: 1rem;

        .etiquette {
          margin: 0 0 .5rem;
          font-weight: 600;
        }

        .point {
          width: 22px;
          aspect-ratio: 1;
          border-radius: 50%;
          
          animation-name: aller-retour;
          animation-duration: 2s;
          animation-direction: alternate;
        }
      }

      .duree-courte .point {
        background: var(--couleur-1);
        animation-duration: 800ms;
      }

      .avec-delai .point {
        background: var(--couleur-2);
        /* À compléter : ajouter un délai de 1 seconde avant le départ de cette animation. */
      }

      .iterations-limitees .point {
        background: var(--couleur-3);
        animation-iteration-count: 3;
      }
    }

    @keyframes aller-retour {
      from { transform: translateX(0); }
      to { transform: translateX(760px); }
    }
  </style>
</head>
<body>
  <div class="grille">
    <h1>3 - Durée, délai et itérations</h1>
    <div class="ligne duree-courte"><p class="etiquette">Durée courte</p><div class="point"></div></div>
    <div class="ligne avec-delai"><p class="etiquette">Avec délai</p><div class="point"></div></div>
    <div class="ligne iterations-limitees"><p class="etiquette">Itérations limitées</p><div class="point"></div></div>
  </div>
</body>
</html>
