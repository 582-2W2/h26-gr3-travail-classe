<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 - Fonctions temporelles prédéfinies</title>
  <style>
    :root {
      --fond: #020617;
      --carte: #0f172a;
      --texte: #e2e8f0;
      --piste: #1e293b;
      --point: #38bdf8;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--fond);
      color: var(--texte);
      padding: 2rem;

      .contenu {
        max-width: 920px;
        margin: 0 auto;
      }

      .ligne {
        background: var(--carte);
        border: 1px solid #334155;
        border-radius: 12px;
        padding: .8rem;
        margin-bottom: .7rem;

        .etiquette {
          margin: 0 0 .4rem;
          font-size: .95rem;
          opacity: .9;
        }

        .piste {
          height: 10px;
          border-radius: 999px;
          background: var(--piste);
          position: relative;
        }

        .point {
          width: 18px;
          aspect-ratio: 1;
          border-radius: 50%;
          background: var(--point);
          position: absolute;
          top: -4px;
          animation-name: avancer;
          animation-duration: 2.4s;
          animation-iteration-count: 5;
        }
      }

      .linear .point {
        /* À compléter : accélération */

      }

      .ease .point {
        /* À compléter : accélération */

      }

      .ease-in .point {
        /* À compléter : accélération */

      }

      .ease-out .point {
        /* À compléter : accélération */

      }

      .ease-in-out .point {
        /* À compléter : accélération */

      }

      .step-start .point {
        /* À compléter : animation par étape discrète */
        
      }

      /* À compléter : animation par étape discrète. */
      

    }

    /* À compléter : modifier l'animation pour utiliser la propriété translate et des unités relatives. */
    @keyframes avancer {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(820px);
      }
    }
  </style>
</head>

<body>
  <div class="contenu">
    <h1>4 - Fonctions temporelles prédéfinies</h1>
    <div class="ligne linear">
      <p class="etiquette">linear</p>
      <div class="piste">
        <div class="point"></div>
      </div>
    </div>
    <div class="ligne ease">
      <p class="etiquette">ease</p>
      <div class="piste">
        <div class="point"></div>
      </div>
    </div>
    <div class="ligne ease-in">
      <p class="etiquette">ease-in</p>
      <div class="piste">
        <div class="point"></div>
      </div>
    </div>
    <div class="ligne ease-out">
      <p class="etiquette">ease-out</p>
      <div class="piste">
        <div class="point"></div>
      </div>
    </div>
    <div class="ligne ease-in-out">
      <p class="etiquette">ease-in-out</p>
      <div class="piste">
        <div class="point"></div>
      </div>
    </div>
    <div class="ligne step-start">
      <p class="etiquette">step-start</p>
      <div class="piste">
        <div class="point"></div>
      </div>
    </div>
    <div class="ligne step-end">
      <p class="etiquette">step-end</p>
      <div class="piste">
        <div class="point"></div>
      </div>
    </div>
  </div>
</body>

</html>
