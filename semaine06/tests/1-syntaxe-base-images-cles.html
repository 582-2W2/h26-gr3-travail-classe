<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1 - Syntaxe de base des images-clés</title>
  <style>
    :root {
      --fond: #f8fafc;
      --piste: #e2e8f0;
      --balle: #f97316;
      --texte: #0f172a;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--fond);
      color: var(--texte);
      padding: 2rem;

      .zone {
        width: 90vw;
        margin: 0 auto;
      }

      .piste {
        background: var(--piste);
        border-radius: 8px;
        height: 16px;
        position: relative;
        margin-top: 2rem;
      }

      .balle {
        width: 48px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--balle);
        position: absolute;
        top: -16px;

        /* À compléter : appliquer l'animation et ses propriétés */
        animation-name: deplacer-balle;
        animation-duration: 1s;
        /* animation-iteration-count: infinite; */
        animation-direction: alternate;
        animation-timing-function: ease-out;
        /* animation-fill-mode: forwards; */
        animation-fill-mode: both;
        animation-delay: 2s;
      }
    }

    /* À compléter : ajouter les étapes from/to de l'animation glisser pour déplacer la balle horizontalement. */
    /* Déclarer (ou définir) une animation (par images-clés) */
    @keyframes deplacer-balle {
      from {
        translate: 100px;
      }
      to {
        translate: calc(90vw - 48px);
      }
    }

  </style>
</head>

<body>
  <div class="zone">
    <h1>1 - Syntaxe de base</h1>
    <p>Compléter la définition de <code>@keyframes glisser</code>.</p>
    <div class="piste">
      <div class="balle" aria-hidden="true"></div>
    </div>
  </div>
</body>

</html>
