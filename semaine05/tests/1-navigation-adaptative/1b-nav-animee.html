<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1b - Navigation adaptative animée</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background: #eef2f7;
      color: #111827;
      overflow-x: hidden;
    }

    .entete {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: #0f172a;
      color: #fff;
    }

    .logo {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    .nav-toggle {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .burger {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.3rem;
      width: 2rem;
      height: 2rem;
      cursor: pointer;
      transition: rotate 200ms;
    }

    .burger span {
      width: 1.5rem;
      height: 2px;
      background: currentColor;
      transform-origin: center;
      /* A FAIRE: ajouter une transition pour les transformations */

    }

    .nav-principale {
      position: fixed;
      top: 3.5rem;
      right: 0;
      width: min(82vw, 20rem);
      height: calc(100vh - 3.5rem);
      background: #111827;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      padding: 1rem;

      pointer-events: none;
      /* A FAIRE: préparer un état caché animé (translation/fondu) */
      translate: 100%;
      opacity: 0;

      /* A FAIRE: transition de la navigation */
      transition: opacity 200ms, translate 200ms;
    }

    .nav-principale a {
      color: #fff;
      text-decoration: none;
      padding: 0.65rem 0.75rem;
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-toggle:checked ~ .nav-principale {
      pointer-events: auto;
      /* A FAIRE: afficher le panneau quand le menu est ouvert */
      translate: initial;
      opacity: 1;
    }

    /* A FAIRE: transformer les barres du label ("burger") quand la case à cocher est cochée */
    /* .nav-toggle:checked + .burger {
      rotate: 5.25turn;
    } */
    .nav-toggle:checked + label > span:nth-child(1) {
      translate: 0 7px;
      rotate: 45deg;
    }
    .nav-toggle:checked + label > span:nth-child(2) {
      opacity: 0;
    }
    .nav-toggle:checked + label > span:nth-child(3) {
      translate: 0 -7px;
      rotate: -45deg;
    }

    main {
      max-width: 68rem;
      margin: 0 auto;
      padding: 1rem;
    }

    .bloc {
      background: #fff;
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }

    @media (min-width: 768px) {
      .burger {
        display: none;
      }

      .nav-principale {
        /* A FAIRE: revenir à une navigation visible en ligne sur desktop */
        position: static;
        height: auto;
        flex-direction: row;
        opacity: 1;
        translate: 0;

        pointer-events: auto;
        background: transparent;
        padding: 0;
        margin-left: auto;
      }

      .nav-principale a {
        background: transparent;
      }
    }
  </style>
</head>

<body>
  <header class="entete">
    <a class="logo" href="#">CinéTIM</a>

    <input id="nav-toggle" class="nav-toggle" type="checkbox">
    <label for="nav-toggle" class="burger" aria-label="Afficher la navigation">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="nav-principale" aria-label="Navigation principale">
      <a href="#">Accueil</a>
      <a href="#">Films</a>
      <a href="#">Horaires</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <h1>Exemple 1b - Animation CSS (à compléter)</h1>
    <div class="bloc">But: animer le menu et le bouton burger quand l'état change.</div>
    <div class="bloc">Conserver une version statique et claire à partir du breakpoint desktop.</div>
  </main>
</body>

</html>
