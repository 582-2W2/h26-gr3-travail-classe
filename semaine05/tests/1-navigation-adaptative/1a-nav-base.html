<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1a - Navigation adaptative (base)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      background: #f5f6f8;
      color: #1f2937;
    }

    .entete {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: #111827;
      color: #fff;
    }

    .logo {
      color: inherit;
      text-decoration: none;
      font-weight: 700;
    }

    .nav-toggle {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .burger {
      display: inline-flex;
      flex-direction: column;
      gap: 0.25rem;
      cursor: pointer;
      padding: 0.25rem;
    }

    .burger span {
      display: block;
      width: 1.5rem;
      height: 2px;
      background: currentColor;
    }

    .nav-principale {
      /* A FAIRE: masquer le menu sur mobile, puis prévoir sa direction */
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      background: #0b1220;
      padding: 0.75rem 1rem 1rem;
    }

    .nav-principale a {
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
    }

    .nav-principale a:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    /* A FAIRE: afficher la nav quand le contrôle (checkbox) est actif (checked) */
    #nav-toggle:checked ~ .nav-principale {
      display: flex;
    }

    main {
      max-width: 60rem;
      margin: 0 auto;
      padding: 1rem;
    }

    @media (min-width: 768px) {
      .burger {
        /* A FAIRE: masquer le bouton burger sur plus grand écran */
        display: none;
      }

      .nav-principale {
        /* A FAIRE: rendre la navigation visible en ligne sur desktop */
        display: flex;
        flex-direction: row;
        background: transparent;
        padding: 0;
        margin-left: auto;
      }

      .nav-principale a {
        padding: 0.4rem 0.75rem;
      }
    }
  </style>
</head>

<body>
  <header class="entete">
    <a class="logo" href="#">CinéTIM</a>

    <input id="nav-toggle" class="nav-toggle" type="checkbox">
    <label for="nav-toggle" class="burger" aria-label="Afficher la navigation">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="nav-principale" aria-label="Navigation principale">
      <a href="#">Accueil</a>
      <a href="#">Films</a>
      <a href="#">Billetterie</a>
      <a href="#">À propos</a>
    </nav>
  </header>

  <main>
    <h1>Exemple 1a - Base HTML/CSS (à compléter)</h1>
    <p>Objectif: mettre en place un menu adaptatif mobile-first sans JavaScript.</p>
  </main>
</body>

</html>
